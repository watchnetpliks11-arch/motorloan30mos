<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Payment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --accent: #e8a020;
    --accent-dim: #7a5010;
    --paid: #2a9d5c;
    --paid-dim: #0f3d22;
    --text: #f0ede8;
    --muted: #6b6560;
    --danger: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 36px;
    border-left: 4px solid var(--accent);
    padding-left: 20px;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 64px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }

  .header h1 span { color: var(--accent); }

  /* Summary bar */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .stat-value.green { color: var(--paid); }
  .stat-value.orange { color: var(--accent); }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 32px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .progress-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
  }

  .progress-track {
    height: 8px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); border-color: #444; }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

  /* Payment list */
  .payment-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .payment-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .payment-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
  }

  .payment-item:hover { border-color: #3a3a3a; transform: translateX(2px); }

  .payment-item.paid { background: #111a14; border-color: #1e3d27; }
  .payment-item.paid::before { background: var(--paid); }

  .payment-item.hidden { display: none; }

  /* Checkbox */
  .check-box {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .payment-item.paid .check-box {
    background: var(--paid);
    border-color: var(--paid);
  }

  .check-icon {
    opacity: 0;
    transform: scale(0.4);
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
  }

  .payment-item.paid .check-icon {
    opacity: 1;
    transform: scale(1);
  }

  /* Month info */
  .month-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--muted);
    width: 28px;
    flex-shrink: 0;
  }

  .payment-item.paid .month-num { color: var(--paid); }

  .month-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .payment-item.paid .month-name {
    color: var(--paid);
    text-decoration: line-through;
    text-decoration-color: var(--paid-dim);
  }

  .month-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--muted);
    min-width: 70px;
    text-align: right;
  }

  .payment-item.paid .amount { color: var(--paid); }

  .paid-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--paid-dim);
    color: var(--paid);
    padding: 3px 7px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .payment-item.paid .paid-badge { opacity: 1; }

  /* confetti pop */
  @keyframes pop {
    0% { transform: translateX(2px) scale(1); }
    40% { transform: translateX(2px) scale(1.015); }
    100% { transform: translateX(2px) scale(1); }
  }

  .payment-item.pop { animation: pop 0.3s ease; }

  /* Footer note */
  .footer-note {
    text-align: center;
    margin-top: 32px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  @media (max-width: 480px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .summary .stat:last-child { grid-column: span 2; }
    .paid-badge { display: none; }
    .month-date { display: none; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="header-label">Payment Tracker</div>
    <h1>MOTO <span>LOAN</span></h1>
  </div>

  <div class="summary">
    <div class="stat">
      <span class="stat-label">Total Months</span>
      <span class="stat-value" id="totalMonths">30</span>
    </div>
    <div class="stat">
      <span class="stat-label">Paid</span>
      <span class="stat-value green" id="paidCount">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Remaining</span>
      <span class="stat-value orange" id="remainAmt">₱30,000</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-title">Overall Progress</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('unpaid', this)">Unpaid</button>
    <button class="filter-btn" onclick="setFilter('paid', this)">Paid</button>
  </div>

  <div class="payment-list" id="paymentList"></div>

  <div class="footer-note">Click any row to mark as paid / unpaid &nbsp;·&nbsp; ₱1,000 / month × 30 months</div>
</div>

<script>
  const TOTAL = 30;
  const AMOUNT = 1000;
  const STORAGE_KEY = 'moto_payments_v1';

  // Load saved state
  let paid = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  // Generate month labels starting from this month
  function getMonthLabel(index) {
    const now = new Date();
    const d = new Date(now.getFullYear(), now.getMonth() + index, 1);
    return {
      month: d.toLocaleString('default', { month: 'long' }),
      year: d.getFullYear(),
      short: d.toLocaleString('default', { month: 'short' }).toUpperCase() + ' ' + d.getFullYear()
    };
  }

  let currentFilter = 'all';

  function render() {
    const list = document.getElementById('paymentList');
    list.innerHTML = '';

    for (let i = 0; i < TOTAL; i++) {
      const isPaid = paid.includes(i);
      const lbl = getMonthLabel(i);
      const isHidden = (currentFilter === 'paid' && !isPaid) || (currentFilter === 'unpaid' && isPaid);

      const item = document.createElement('div');
      item.className = 'payment-item' + (isPaid ? ' paid' : '') + (isHidden ? ' hidden' : '');
      item.dataset.index = i;
      item.innerHTML = `
        <div class="check-box">
          <svg class="check-icon" width="12" height="9" viewBox="0 0 12 9" fill="none">
            <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="month-num">#${String(i + 1).padStart(2, '0')}</span>
        <span class="month-name">${lbl.month} ${lbl.year}</span>
        <span class="month-date">${lbl.short}</span>
        <span class="paid-badge">PAID</span>
        <span class="amount">₱${AMOUNT.toLocaleString()}</span>
      `;
      item.addEventListener('click', () => toggle(i, item));
      list.appendChild(item);
    }

    updateStats();
  }

  function toggle(index, el) {
    const wasPaid = paid.includes(index);
    if (wasPaid) {
      paid = paid.filter(i => i !== index);
      el.classList.remove('paid');
    } else {
      paid.push(index);
      el.classList.add('paid');
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 400);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(paid));
    updateStats();

    // Hide if filter doesn't match
    if (currentFilter === 'paid' && wasPaid) el.classList.add('hidden');
    if (currentFilter === 'unpaid' && !wasPaid) el.classList.add('hidden');
  }

  function updateStats() {
    const paidCount = paid.length;
    const remaining = (TOTAL - paidCount) * AMOUNT;
    const pct = Math.round((paidCount / TOTAL) * 100);

    document.getElementById('paidCount').textContent = paidCount;
    document.getElementById('remainAmt').textContent = '₱' + remaining.toLocaleString();
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  render();
</script>
</body>
</html>
